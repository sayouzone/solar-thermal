version: "3.9"

services:
  api:
    build: .
    image: solar-thermal:latest
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SOLAR_THERMAL_CONFIG=/app/configs/default.yaml
      # GCS 사용 시:
      # - GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcs-sa.json
      # S3 사용 시:
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
      - ./configs:/app/configs:ro
      - cache:/var/cache/solar-thermal
    # GPU 사용 시 아래 주석 해제 (nvidia-docker 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  cache:
